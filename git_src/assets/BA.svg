<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" fill="black"></rect>

  <!-- Frame -->
  <rect x="128" y="128" width="768" height="768" fill="none" stroke="#2F6BFF" stroke-width="28"></rect>

  <!-- Stylized A -->
  <polygon points="512,240 320,768 400,768 448,640 576,640 624,768 704,768" fill="none" stroke="#2F6BFF" stroke-width="28" stroke-linejoin="round"></polygon>

  <!-- Crossbar -->
  <line x1="460" y1="600" x2="564" y2="600" stroke="#2F6BFF" stroke-width="28"></line>

  <!-- Simplified Gear (bold, icon-friendly) -->
  <g transform="translate(740,300)">
    <!-- Teeth as blocks -->
    <rect x="-12" y="-90" width="24" height="28" fill="#9AA0A6"></rect>
    <rect x="-12" y="62" width="24" height="28" fill="#9AA0A6"></rect>
    <rect x="62" y="-12" width="28" height="24" fill="#9AA0A6"></rect>
    <rect x="-90" y="-12" width="28" height="24" fill="#9AA0A6"></rect>

    <!-- Diagonal teeth -->
    <rect x="40" y="-70" width="24" height="24" transform="rotate(45 52 -58)" fill="#9AA0A6"></rect>
    <rect x="40" y="46" width="24" height="24" transform="rotate(45 52 58)" fill="#9AA0A6"></rect>
    <rect x="-64" y="46" width="24" height="24" transform="rotate(45 -52 58)" fill="#9AA0A6"></rect>
    <rect x="-64" y="-70" width="24" height="24" transform="rotate(45 -52 -58)" fill="#9AA0A6"></rect>

    <!-- Core -->
    <circle cx="0" cy="0" r="48" fill="#9AA0A6"></circle>
    <circle cx="0" cy="0" r="20" fill="black"></circle>
  </g>
</svg>